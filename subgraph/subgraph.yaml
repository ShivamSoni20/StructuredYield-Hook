specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: StructuredYieldHook
    network: unichain-sepolia
    source:
      address: "0x03FBa520D28659c9CA074cD39d0c43CB40C00537"
      abi: StructuredYieldHook
      startBlock: 5000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Position
        - FeeRoute
        - ILCoverage
      abis:
        - name: StructuredYieldHook
          file: ../contracts/out/StructuredYieldHook.sol/StructuredYieldHook.json
      eventHandlers:
        - event: PTYTMinted(indexed bytes32,indexed address,uint256,uint256,uint256)
          handler: handlePTYTMinted
        - event: FeesRouted(indexed bytes32,uint256,uint256)
          handler: handleFeesRouted
        - event: ILCovered(indexed bytes32,indexed address,uint256,uint256)
          handler: handleILCovered
        - event: PositionClosed(indexed bytes32,indexed address,uint256,uint256)
          handler: handlePositionClosed
      file: ./src/mappings.ts
